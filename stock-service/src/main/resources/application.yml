spring:
  application:
    name: stock-service
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:redispassword}

server:
  port: 8301


# Eureka settings with dynamic registry environment variables
eureka:
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}

management:
  endpoints:
    web:
      exposure:
        include: health, info

resilience4j:
  circuitbreaker:
    instances:
      dbServiceCircuit:
        registerHealthIndicator: true
        # Monitor the last 10 requests
        slidingWindowSize: 10
        # If 50% or more of the last 10 requests fail, trip the circuit
        failureRateThreshold: 50
        # Keep the circuit OPEN for 15 seconds before trying to recover
        waitDurationInOpenState: 15s
        # Minimum number of calls required before calculating error rate
        minimumNumberOfCalls: 5
        # Send 3 test requests in HALF-OPEN state to verify service recovery
        permittedNumberOfCallsInHalfOpenState: 3
      yahooFinanceCircuit:
        registerHealthIndicator: true
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2

app:
  docs:
    error-base-url: https://docs.faizalzafri.com/errors

springdoc:
  swagger-ui:
    config-url: /api/stock-service/v3/api-docs/swagger-config
    url: /api/stock-service/v3/api-docs

