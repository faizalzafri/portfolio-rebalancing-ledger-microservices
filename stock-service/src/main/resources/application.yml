spring:
  application:
    name: stock-service

server:
  port: 8301


# Eureka settings with dynamic registry environment variables
eureka:
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}

management:
  endpoints:
    web:
      exposure:
        include: health, info

resilience4j:
  circuitbreaker:
    instances:
      dbServiceCircuit:
        registerHealthIndicator: true
        # Monitor the last 10 requests
        slidingWindowSize: 10
        # If 50% or more of the last 10 requests fail, trip the circuit
        failureRateThreshold: 50
        # Keep the circuit OPEN for 15 seconds before trying to recover
        waitDurationInOpenState: 15s
        # Minimum number of calls required before calculating error rate
        minimumNumberOfCalls: 5
        # Send 3 test requests in HALF-OPEN state to verify service recovery
        permittedNumberOfCallsInHalfOpenState: 3