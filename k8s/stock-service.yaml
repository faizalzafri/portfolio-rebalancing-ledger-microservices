apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-service
  template:
    metadata:
      labels:
        app: stock-service
    spec:
      containers:
        - name: stock-service
          image: spring-stock-microservices-stock-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8301
          envFrom:
            - configMapRef:
                name: spring-stock-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8301
            initialDelaySeconds: 25
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: stock-service
spec:
  ports:
    - port: 8301
      targetPort: 8301
  selector:
    app: stock-service
