apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: spring-stock-microservices-gateway-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8302
          envFrom:
            - configMapRef:
                name: spring-stock-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8302
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  type: NodePort
  ports:
    - port: 8302
      targetPort: 8302
      nodePort: 30082
  selector:
    app: gateway-service
