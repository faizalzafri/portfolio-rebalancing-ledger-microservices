spring.application.name=db-service
server.port=8300

# ===================================================================
# Database Connection Settings
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/stockdbservice
spring.datasource.username=postgres
spring.datasource.password=postgres

# ===================================================================
# JPA / Hibernate Configurations
# ===================================================================
# Controls automatic DDL database schema updates (update, create, create-drop, validate, none)
spring.jpa.hibernate.ddl-auto=update

# Explicitly defines the database dialect platform for Spring Boot 3
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Enables SQL statement logging to the console (useful for development)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# Hikari Connection Pool Settings (Optional fine-tuning)
# ===================================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000


management.endpoints.web.exposure.include=health, info